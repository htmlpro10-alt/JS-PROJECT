<!DOCTYPE html>

<html>
<head>
  <link rel="stylesheet" href="style.css"/>
  
  <title>Js Pratice</title>
</head>
<body>
  
  <div class="main-container">
    <form class="form">
      <h1 class="header">STUDENT FORM</h1>
      <table border="1" class="table">
        <tr>
          <td>Name</td> <td> <input placeholder="Enter Your Name" id="nameinput"> </td>
        </tr>
        
        <tr>
          <td>Age</td> <td> <input type="number" placeholder="Enter Your Age" id="ageinput"> </td>
        </tr>
      
        <tr>
          <td>Gender</td> <td> <input type="radio" name="Gender" id="gender1">Male <input type="radio" name="Gender" id="gender2">Female </td>
        </tr>
      
        <tr>
          <td>Course</td> 
          <td> 
            <select id="option">
              <option value="Python">Python</option>
              <option value="JavaScript">JavaScript</option>
              <option value="C++">C++</option>
            </select>
          </td>
        </tr>
      
        <tr>
          <td>Email</td> <td> <input type="email" placeholder="Enter Your Email" id="emailinput"> </td>
        </tr>  
        <button class="save" id="savebtn">Save</button>  
      </table>
      <table border="1" class="todo-table" id="actiontable">
        <tr>
          <td>Name</td><td>Age</td><td>Gender</td><td>Course</td><td>Email</td><td>Action</td>
        </tr>
        <tr>
          <td>ibrahim</td><td>25</td><td>Male</td><td>JavaScript</td><td>ibrahim@example.com</td><td><button class="delete-btn" onclick="deleteRow(this)">Delete</button></td>
        </tr>
      </table>
    </form>
  </div>
  
  
  
  
  
  <script src="script.js"></script>
</body>
</html>
